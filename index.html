<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Form Website</title>

<style>
body {
    background: #0f8b8d;
    font-family: Arial, sans-serif;
    color: white;
    padding: 30px;
}

/* Open button */
button.open-btn {
    padding: 12px 25px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

/* Form container (card) */
.form-card {
    margin-top: 30px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    max-width: 600px;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.5s ease;
    display: none;
}

/* Show animation */
.form-card.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* Close button */
.close-btn {
    background: red;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    float: right;
    margin: 10px;
    border-radius: 4px;
}

iframe {
    width: 100%;
    height: 420px;
    border: none;
}
</style>
</head>

<body>

<h1>My Mini Form Website</h1>
<p>Click below to open the form</p>

<button class="open-btn" onclick="openForm()">Open Mini Form</button>

<!-- Form Card -->
<div class="form-card" id="formCard">
    <button class="close-btn" onclick="closeForm()">Close ✖</button>
    <iframe src="form.html"></iframe>
</div>

<script>
function openForm() {
    const card = document.getElementById("formCard");
    card.classList.add("show");
    card.style.display = "block";

    // Auto scroll
    card.scrollIntoView({ behavior: "smooth" });
}

function closeForm() {
    const card = document.getElementById("formCard");
    card.classList.remove("show");

    setTimeout(() => {
        card.style.display = "none";
    }, 300);
}
</script>

</body>
</html>
