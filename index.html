<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Form Website</title>

<style>
body {
    background: #0f8b8d;
    font-family: Arial, sans-serif;
    color: white;
    padding: 30px;
}

/* Open button */
.open-btn {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Form card (desktop) */
.form-card {
    margin-top: 30px;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    max-width: 600px;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.5s ease;
    display: none;
}

/* Show animation */
.form-card.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* Close button */
.close-btn {
    background: red;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    margin: 10px;
    border-radius: 4px;
}

/* iframe */
iframe {
    width: 100%;
    height: 420px;
    border: none;
}

/* 📱 MOBILE FULLSCREEN */
@media (max-width: 768px) {
    .form-card {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        max-width: none;
        border-radius: 0;
        z-index: 9999;
    }

    iframe {
        height: calc(100% - 50px);
    }
}
</style>
</head>

<body>

<h1>My Mini Form Website</h1>
<p>Click below to open the form</p>

<button class="open-btn" onclick="openForm()">Open Mini Form</button>

<div class="form-card" id="formCard">
    <button class="close-btn" onclick="closeForm()">Close ✖</button>
    <iframe src="form.html"></iframe>
</div>

<script>
function openForm() {
    const card = document.getElementById("formCard");
    card.style.display = "block";
    card.classList.add("show");

    // Auto scroll (desktop)
    if (window.innerWidth > 768) {
        card.scrollIntoView({ behavior: "smooth" });
    }
}

function closeForm() {
    const card = document.getElementById("formCard");
    card.classList.remove("show");

    setTimeout(() => {
        card.style.display = "none";
    }, 300);
}
</script>

</body>
</html>
