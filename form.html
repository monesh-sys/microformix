<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 0;
}

/* Form container */
.form-container {
    background: white;
}

/* Banner image */
.form-banner {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* Form content */
.form-content {
    padding: 20px;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

button {
    background: #0f8b8d;
    color: white;
    border: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="form-container">
    <!-- YOUR IMAGE -->
    <img src="form-banner.png" class="form-banner">

    <div class="form-content">
        <h2>Mini Form</h2>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <button type="submit">Submit</button>
    </div>
</div>

</body>
</html>
