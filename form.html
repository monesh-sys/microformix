<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Form</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
}

/* Banner */
.form-banner {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* Form */
.form-content {
    padding: 20px;
    background: white;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
}

button {
    background: #0f8b8d;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* Loader */
.loader {
    display: none;
    text-align: center;
    margin-top: 15px;
}

.loader span {
    width: 10px;
    height: 10px;
    background: #0f8b8d;
    display: inline-block;
    border-radius: 50%;
    animation: bounce 0.8s infinite alternate;
}

.loader span:nth-child(2) { animation-delay: .2s }
.loader span:nth-child(3) { animation-delay: .4s }

@keyframes bounce {
    to { transform: translateY(-10px); }
}
</style>
</head>

<body>

<img src="form-banner.png" class="form-banner">

<div class="form-content">
    <h2>Mini Form</h2>

    <form onsubmit="submitForm(event)">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>

        <button type="submit">Submit</button>

        <div class="loader" id="loader">
            <span></span><span></span><span></span>
        </div>
    </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzzC8aHm1yfi7qlHS7aWg2Udfxb9R9OGvM9qpOjAW1O8FPnpnhSzE3vamj-k7BETXrJbA/exec";

function submitForm(e) {
    e.preventDefault();

    document.getElementById("loader").style.display = "block";

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value
        })
    })
    .then(() => {
        alert("Form submitted successfully!");
        document.getElementById("loader").style.display = "none";
        e.target.reset();
    })
    .catch(() => {
        alert("Error submitting form");
        document.getElementById("loader").style.display = "none";
    });
}
</script>

</body>
</html>
